<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Dual Vibe - Premium Edition</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Nunito:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            text-decoration:none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html{
            width:100%;
            height:100dvh;
            background:#000;
            overflow:hidden;
            font-family:'Nunito',sans-serif;
            transition:0.5s;
        }

        ::-webkit-scrollbar{
            display:none;
        }

        *{
            -ms-overflow-style:none;
            scrollbar-width:none;
        }

        /* ================= GATE ================= */

        #gate{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100dvh;
            display:flex;
            z-index:99999;
            transition:0.8s ease-in-out;
        }

        .door{
            flex:1;
            height:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            cursor:pointer;
            transition:0.6s ease;
            font-size:clamp(1.5rem,4vw,3rem);
            font-weight:900;
            border:none;
            outline:none;
            position:relative;
            overflow:hidden;
        }

        .door-girl{
            background:linear-gradient(135deg,#ff1493,#ff69b4);
            color:#fff;
            text-shadow:2px 2px 10px #ff007f;
            text-transform:uppercase;
        }

        .door-boy{
            background:linear-gradient(135deg,#1a0000,#050505);
            color:#ff0000;
            border-left:2px solid #ff0000;
            font-family:'Montserrat',sans-serif;
            text-transform:uppercase;
        }

        .door:hover{
            flex:1.4;
        }

        .custom-emoji{
            width:1.2em;
            height:1.2em;
            margin-left:10px;
            display:inline-block;
            vertical-align:middle;
            filter:drop-shadow(0 0 8px #ff1493);
            animation:breathe 2s infinite alternate;
            pointer-events:none;
        }

        @keyframes breathe{
            0%{
                transform:scale(1);
            }
            100%{
                transform:scale(1.1);
            }
        }

        /* ================= MODAL ================= */

        #name-modal{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100dvh;
            background:rgba(0,0,0,0.8);
            z-index:100000;
            justify-content:center;
            align-items:center;
            backdrop-filter:blur(10px);
            flex-direction:column;
            opacity:0;
            transition:0.5s;
        }

        .modal-box{
            background:rgba(255,105,180,0.2);
            padding:30px;
            border-radius:20px;
            text-align:center;
            color:white;
            width:90%;
            max-width:350px;
            transform:translateY(50px);
            transition:0.5s;
            border:1px solid rgba(255,255,255,0.4);
            backdrop-filter:blur(20px);
            box-shadow:0 10px 40px rgba(255,20,147,0.5);
        }

        .modal-box h2{
            margin-bottom:20px;
            font-size:1.5rem;
            font-weight:900;
        }

        .modal-box input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            font-size:1.1rem;
            font-weight:700;
            text-align:center;
            outline:none;
        }

        .modal-box button{
            margin-top:20px;
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#fff;
            color:#ff1493;
            font-size:1.1rem;
            font-weight:900;
            cursor:pointer;
        }

        /* ================= WORLD ================= */

        .world{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100dvh;
            display:none;
            opacity:0;
            overflow-y:auto;
            overflow-x:hidden;
            transition:1s;
        }

        .section{
            width:100%;
            min-height:100dvh;
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
            padding:40px 20px;
            overflow:hidden;
        }

        .scroll-down-icon{
            position:absolute;
            bottom:5vh;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:5px;
            font-size:0.8rem;
            font-weight:900;
            letter-spacing:2px;
            text-transform:uppercase;
            animation:floatUpDown 2s infinite ease-in-out;
            z-index:50;
        }

        .scroll-down-icon::after{
            content:'↓';
            font-size:1.5rem;
        }

        @keyframes floatUpDown{
            0%,100%{
                transform:translate(-50%,0);
            }
            50%{
                transform:translate(-50%,10px);
            }
        }

        .para-bold{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            width:100%;
            text-align:center;
            white-space:nowrap;
            font-size:clamp(3.5rem,18vw,12rem);
            font-weight:900;
            color:transparent;
            z-index:0;
            pointer-events:none;
        }

        /* ================= GIRL WORLD ================= */

        #world-girl{
            background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 100%);
            color:#fff;
        }

        .main-flirt{
            background:rgba(255,255,255,0.3);
            padding:30px;
            border-radius:20px;
            text-align:center;
            font-size:1.3rem;
            font-weight:900;
            width:90%;
            max-width:450px;
            backdrop-filter:blur(15px);
            z-index:10;
            color:#333;
        }

        .g-card{
            background:rgba(255,255,255,0.25);
            border-radius:25px;
            padding:35px 25px;
            width:100%;
            max-width:450px;
            z-index:10;
            color:#333;
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.6);
            text-align:center;
            opacity:0;
            transform:translateY(50px);
            transition:0.8s;
        }

        .g-card.visible{
            opacity:1;
            transform:translateY(0);
        }

        .g-title{
            font-size:1.4rem;
            font-weight:900;
            color:#ff1493;
            margin-bottom:10px;
        }

        .g-flirt{
            font-size:1.1rem;
            font-weight:700;
            line-height:1.6;
        }

        /* ================= BOY WORLD ================= */

        #world-boy{
            background:#050505;
            color:#fff;
            font-family:'Montserrat',sans-serif;
            position:relative;
        }

        #spidey-canvas{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100dvh;
            z-index:1;
            pointer-events:none;
        }

        .yaser-name{
            font-size:clamp(4rem,15vw,8rem);
            font-weight:900;
            color:#ff0000;
            letter-spacing:10px;
            z-index:10;
            text-shadow:0 0 30px rgba(255,0,0,0.8);
        }

        .yaser-bio{
            font-size:1rem;
            font-weight:700;
            letter-spacing:2px;
            text-transform:uppercase;
            z-index:10;
        }

        .b-card{
            background:rgba(10,10,10,0.85);
            border:2px solid #550000;
            width:100%;
            max-width:450px;
            padding:30px;
            border-radius:15px;
            color:#fff;
            z-index:10;
            opacity:0;
            transform:translateY(50px);
            transition:0.8s;
        }

        .b-card.visible{
            opacity:1;
            transform:translateY(0);
            border-color:#ff0000;
        }

        .b-num{
            font-size:5rem;
            color:#ff0000;
            font-weight:900;
        }

        .b-title{
            font-size:1.5rem;
            text-transform:uppercase;
        }

    </style>
</head>

<body>

<audio id="bg-music" src="sanam.mp3" preload="auto"></audio>

<!-- ================= GATE ================= -->

<div id="gate">

    <button class="door door-girl" onclick="openGirlModal()">

        FOR HER

        <svg class="custom-emoji" viewBox="0 0 100 100">

            <path d="M50 85 C 15 55, 5 25, 25 15 C 40 8, 50 25, 50 25 C 50 25, 60 8, 75 15 C 95 25, 85 55, 50 85 Z" fill="#ff1493"/>

        </svg>

    </button>

    <button class="door door-boy" onclick="startBoyIntro()">
        FOR HIM 🕷️
    </button>

</div>

<!-- ================= NAME MODAL ================= -->

<div id="name-modal">

    <div class="modal-box">

        <h2>Kaun hai wo haseen?</h2>

        <input type="text" id="girl-name-input" placeholder="Naam likho...">

        <button onclick="processGirlName()">ENTER</button>

    </div>

</div>

<!-- ================= GIRL WORLD ================= -->

<div id="world-girl" class="world">

    <div class="section">

        <div class="para-bold">NOOR</div>

        <div class="main-flirt" id="dynamic-greeting"></div>

        <div class="scroll-down-icon">Scroll</div>

    </div>

    <div class="section">

        <a href="https://www.instagram.com/" class="g-card scroll-item">

            <div class="g-title">
                <i class="fab fa-instagram"></i>
                Instagram
            </div>

            <div class="g-flirt">
                Tumhari smile dangerous level ki cute hai.
            </div>

        </a>

    </div>

</div>

<!-- ================= BOY WORLD ================= -->

<div id="world-boy" class="world">

    <canvas id="spidey-canvas"></canvas>

    <div class="section" style="flex-direction:column;">

        <div class="yaser-name">YASER</div>

        <div class="yaser-bio">
            Science 🧬 | Code 💻 | Web 🌐 | Tech ⚙️
        </div>

        <div class="scroll-down-icon">
            Scroll
        </div>

    </div>

    <div class="section">

        <div class="para-bold">
            SPIDERMAN
        </div>

        <a href="https://www.instagram.com/" class="b-card scroll-item">

            <span class="b-num">01</span>

            <span class="b-title">
                <i class="fab fa-instagram"></i>
                Main Profile
            </span>

        </a>

    </div>

</div>

<script>

    var isWorldActive = false;

    /* ================= GIRL MODAL ================= */

    function openGirlModal(){

        if(isWorldActive) return;

        var modal = document.getElementById('name-modal');

        modal.style.display = 'flex';

        setTimeout(function(){

            modal.style.opacity = '1';

            document.querySelector('.modal-box').style.transform = 'translateY(0)';

        },10);

    }

    /* ================= BOY WORLD DIRECT OPEN ================= */

    function startBoyIntro(){

        if(isWorldActive) return;

        isWorldActive = true;

        var gate = document.getElementById('gate');

        var world = document.getElementById('world-boy');

        gate.style.transform = 'scale(1.2)';
        gate.style.opacity = '0';

        setTimeout(function(){

            gate.style.display = 'none';

            world.style.display = 'block';

            setTimeout(function(){

                world.style.opacity = '1';

                initScrollObserver();

                initBoyFeatures();

            },50);

        },800);

    }

    /* ================= GIRL WORLD ================= */

    function processGirlName(){

        var name = document.getElementById('girl-name-input').value.trim();

        if(name === "") name = "Haseen";

        document.getElementById('dynamic-greeting').innerHTML =
            "Tumhara naam bhi utna hi khoobsurat hai jitni tum. " + name + " ✨";

        var modal = document.getElementById('name-modal');

        modal.style.opacity = '0';

        setTimeout(function(){

            modal.style.display = 'none';

            triggerWorld('world-girl');

        },500);

    }

    /* ================= OPEN WORLD ================= */

    function triggerWorld(id){

        isWorldActive = true;

        var gate = document.getElementById('gate');

        var world = document.getElementById(id);

        gate.style.transform = 'scale(1.2)';
        gate.style.opacity = '0';

        setTimeout(function(){

            gate.style.display = 'none';

            world.style.display = 'block';

            setTimeout(function(){

                world.style.opacity = '1';

                initScrollObserver();

            },50);

        },800);

    }

    /* ================= SCROLL ANIMATION ================= */

    function initScrollObserver(){

        if(!window.IntersectionObserver) return;

        var cards = document.querySelectorAll('.scroll-item');

        var observer = new IntersectionObserver(function(entries){

            entries.forEach(function(entry){

                if(entry.isIntersecting){

                    entry.target.classList.add('visible');

                }

            });

        },{

            threshold:0.1

        });

        cards.forEach(function(card){

            observer.observe(card);

        });

    }

    /* ================= SPIDEY EFFECT ================= */

    function initBoyFeatures(){

        var canvas = document.getElementById('spidey-canvas');

        var ctx = canvas.getContext('2d');

        function resizeCanvas(){

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

        }

        resizeCanvas();

        window.addEventListener('resize', resizeCanvas);

        var particles = [];

        var mouse = {

            x:-1000,
            y:-1000

        };

        document.addEventListener('mousemove', function(e){

            mouse.x = e.clientX;
            mouse.y = e.clientY;

        });

        for(var i=0;i<120;i++){

            particles.push({

                x:Math.random()*canvas.width,
                y:Math.random()*canvas.height,
                vx:(Math.random()-0.5)*1.5,
                vy:(Math.random()-0.5)*1.5

            });

        }

        function animate(){

            ctx.clearRect(0,0,canvas.width,canvas.height);

            particles.forEach(function(p){

                p.x += p.vx;
                p.y += p.vy;

                if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                if(p.y<0 || p.y>canvas.height) p.vy *= -1;

                ctx.beginPath();

                ctx.arc(p.x,p.y,2,0,Math.PI*2);

                ctx.fillStyle = '#ff0000';

                ctx.fill();

                var dist = Math.sqrt(

                    Math.pow(mouse.x-p.x,2) +
                    Math.pow(mouse.y-p.y,2)

                );

                if(dist < 180){

                    ctx.beginPath();

                    ctx.strokeStyle = 'rgba(255,0,0,'+(1-dist/180)+')';

                    ctx.moveTo(p.x,p.y);

                    ctx.lineTo(mouse.x,mouse.y);

                    ctx.stroke();

                }

            });

            requestAnimationFrame(animate);

        }

        animate();

    }

</script>

</body>
</html>
