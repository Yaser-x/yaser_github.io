<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>The Dual Vibe - Premium Edition</title>  
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Nunito:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
  
<style>  
    * { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none; -webkit-tap-highlight-color: transparent; }  
    body, html { width: 100%; height: 100dvh; background: #000; overflow: hidden; font-family: 'Nunito', sans-serif; transition: background 0.5s; }  
    ::-webkit-scrollbar { display: none; }  
    * { -ms-overflow-style: none; scrollbar-width: none; }  

    /* GATEKEEPER */
    #gate { position: absolute; top: 0; left: 0; width: 100%; height: 100dvh; display: flex; z-index: 99999; transition: opacity 0.8s ease-in-out, transform 0.8s ease; }  
    .door { flex: 1; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: flex 0.6s ease; font-size: clamp(1.5rem, 4vw, 3rem); font-weight: 900; border: none; outline: none; position: relative; overflow: hidden; }  
    .door-girl { background: linear-gradient(135deg, #ff1493, #ff69b4); color: #fff; text-shadow: 2px 2px 10px #ff007f; text-transform: uppercase; }  
    .door-boy { background: linear-gradient(135deg, #1a0000, #050505); color: #ff0000; border-left: 2px solid #ff0000; font-family: 'Montserrat', sans-serif; text-transform: uppercase; }  
    .door:hover { flex: 1.4; }  
    .custom-emoji { width: 1.2em; height: 1.2em; margin-left: 10px; display: inline-block; vertical-align: middle; filter: drop-shadow(0 0 8px #ff1493); animation: breathe 2s infinite alternate; pointer-events: none; }  
    @keyframes breathe { 0% { transform: scale(1); filter: drop-shadow(0 0 5px #ff1493); } 100% { transform: scale(1.1); filter: drop-shadow(0 0 15px #ffb3d9); } }  

    /* FLOATING UI */
    #music-toggle-btn { position: fixed; top: 20px; left: 20px; z-index: 999999; width: 45px; height: 45px; border-radius: 50%; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255,255,255,0.5); backdrop-filter: blur(10px); color: #fff; font-size: 1.2rem; display: none; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 5px 15px rgba(255,20,147,0.3); transition: all 0.3s ease; }  
    #music-toggle-btn:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.1); }  
    #smart-toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: rgba(255,20,147,0.95); color: white; padding: 12px 25px; border-radius: 30px; font-weight: 800; font-size: 1rem; z-index: 1000000; display: none; opacity: 0; transition: opacity 0.5s; box-shadow: 0 10px 30px rgba(255,20,147,0.4); text-align: center; border: 1px solid #fff; pointer-events: none;}
